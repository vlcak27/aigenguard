name: "AgentBOM AI Agent Security Scan"

description: "Offline AI agent bill of materials and attack surface scanning"

branding:
  icon: shield
  color: red

inputs:
  path:
    description: "Repository path to scan"
    default: "."

  fail-on:
    description: "Fail when repository risk is at or above: critical | high | medium | low | none"
    default: "critical"

  sarif-upload:
    description: "Generate and upload SARIF to GitHub code scanning"
    default: "true"

  html:
    description: "Generate a self-contained HTML report"
    default: "false"

  cyclonedx:
    description: "Generate agentbom.cdx.json dependency inventory"
    default: "false"

  output-dir:
    description: "Directory for generated AgentBOM reports"
    default: "agentbom-report"

  policy:
    description: "Optional AgentBOM TOML policy file"
    default: ""

  enforce-policy:
    description: "Fail when the supplied AgentBOM policy has violations"
    default: "false"

outputs:
  risk-score:
    description: "Repository risk score"
    value: ${{ steps.scan.outputs.risk-score }}

  risk-severity:
    description: "Repository risk severity"
    value: ${{ steps.scan.outputs.risk-severity }}

runs:
  using: "composite"

  steps:
    - name: Install AgentBOM
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "$GITHUB_ACTION_PATH"

    - name: Run AgentBOM
      id: scan
      shell: bash
      env:
        AGENTBOM_INPUT_POLICY: ${{ inputs.policy }}
        AGENTBOM_INPUT_ENFORCE_POLICY: ${{ inputs.enforce-policy }}
      run: |
        FLAGS=()

        if [ "${{ inputs.sarif-upload }}" = "true" ]; then
          FLAGS+=(--sarif)
        fi

        if [ "${{ inputs.html }}" = "true" ]; then
          FLAGS+=(--html)
        fi

        if [ "${{ inputs.cyclonedx }}" = "true" ]; then
          FLAGS+=(--cyclonedx)
        fi

        if [ -n "$AGENTBOM_INPUT_POLICY" ]; then
          FLAGS+=(--policy "$AGENTBOM_INPUT_POLICY")
        fi

        if [ "$AGENTBOM_INPUT_ENFORCE_POLICY" = "true" ]; then
          FLAGS+=(--enforce-policy)
        fi

        agentbom scan "${{ inputs.path }}" \
          --output-dir "${{ inputs.output-dir }}" \
          --pretty \
          "${FLAGS[@]}"

        REPORT="${{ inputs.output-dir }}/agentbom.json"

        SCORE=$(python -c "import json; d=json.load(open('$REPORT')); print(d['repository_risk']['score'])")
        SEVERITY=$(python -c "import json; d=json.load(open('$REPORT')); print(d['repository_risk']['severity'])")

        echo "risk-score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "risk-severity=$SEVERITY" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF
      if: inputs.sarif-upload == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output-dir }}/agentbom.sarif

    - name: Enforce fail-on threshold
      shell: bash
      run: |
        severity_rank() {
          case "$1" in
            low) echo 1 ;;
            medium) echo 2 ;;
            high) echo 3 ;;
            critical) echo 4 ;;
            none) echo 99 ;;
            *) echo "invalid" ;;
          esac
        }

        REPORT="${{ inputs.output-dir }}/agentbom.json"
        SEVERITY=$(python -c "import json; d=json.load(open('$REPORT')); print(d['repository_risk']['severity'])")
        FAIL_ON="${{ inputs.fail-on }}"
        ACTUAL_RANK=$(severity_rank "$SEVERITY")
        THRESHOLD_RANK=$(severity_rank "$FAIL_ON")

        if [ "$ACTUAL_RANK" = "invalid" ] || [ "$THRESHOLD_RANK" = "invalid" ]; then
          echo "Invalid fail-on value: $FAIL_ON" >&2
          exit 2
        fi

        if [ "$FAIL_ON" != "none" ] && [ "$ACTUAL_RANK" -ge "$THRESHOLD_RANK" ]; then
          echo "AgentBOM risk severity $SEVERITY meets fail-on threshold $FAIL_ON" >&2
          exit 1
        fi
