name: AigenGuard Security Scan

on:
  push:
    branches: [main]

  pull_request:

permissions:
  contents: read

jobs:
  aigenguard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Run AigenGuard
        id: aigenguard
        uses: ./
        with:
          path: .
          # Public demo mode: keep findings in workflow artifacts without
          # publishing this repository's intentionally risky examples to
          # GitHub code scanning.
          fail-on: none
          sarif-upload: false
          html: true
          output-dir: agentbom-report
          # Enforcement examples for teams ready to gate merges:
          # fail-on: high
          # fail-on: critical

      - name: Upload AigenGuard reports
        uses: actions/upload-artifact@v4
        with:
          name: agentbom-report
          path: agentbom-report/
          if-no-files-found: error
