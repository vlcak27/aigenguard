name: Precision Corpus

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  precision-corpus:
    name: Precision Corpus
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run precision corpus
        run: |
          python scripts/precision_corpus.py | tee precision-corpus.txt

          {
            echo "## Precision Corpus"
            echo
            echo "Static precision regression corpus for AgentBOM."
            echo
            echo '```'
            cat precision-corpus.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
