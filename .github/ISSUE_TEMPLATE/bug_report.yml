name: Bug report
description: Report incorrect behavior in the CLI, scanner, or report output.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AigenGuard version
      placeholder: "aigenguard --version"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the AigenGuard command you ran.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal sample
      description: Share a minimal non-sensitive file or directory layout that reproduces the issue.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include secret values or private repository data.
          required: true
